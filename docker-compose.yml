version: "3.9"

services:
  # ─── Infrastructure ────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg17
    container_name: social_intel_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-social_intelligence}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-social_intelligence_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-social_intelligence}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - social_intel_net

  redis:
    image: redis:7-alpine
    container_name: social_intel_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - social_intel_net

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: social_intel_elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qE '\"status\":\"(green|yellow)\"'"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - social_intel_net

  # Ollama — menjalankan Qwen3 8B untuk LLM reasoning
  ollama:
    image: ollama/ollama:latest
    container_name: social_intel_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - social_intel_net

  # ─── Application ───────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.api
    container_name: social_intel_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-social_intelligence}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-social_intelligence_db}
      REDIS_URL: redis://redis:6379
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      ELASTICSEARCH_URL: http://elasticsearch:9200
      OLLAMA_BASE_URL: http://ollama:11434
      REPORT_OUTPUT_DIR: /app/reports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - reports_data:/app/reports
    networks:
      - social_intel_net

  # Worker — untuk collector, processing, report tasks (tanpa ML deps)
  worker:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.worker
    container_name: social_intel_worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-social_intelligence}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-social_intelligence_db}
      REDIS_URL: redis://redis:6379
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      REPORT_OUTPUT_DIR: /app/reports
    command: >
      celery -A app.workers.celery_app worker
      --loglevel=info
      --queues=collector,processing,reports,celery
      --concurrency=4
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - reports_data:/app/reports
    networks:
      - social_intel_net

  # Beat — Celery Beat scheduler untuk periodic tasks (daily/weekly reports)
  worker-beat:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.worker
    container_name: social_intel_worker_beat
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-social_intelligence}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-social_intelligence_db}
      REDIS_URL: redis://redis:6379
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      REPORT_OUTPUT_DIR: /app/reports
    command: >
      celery -A app.workers.celery_app beat
      --loglevel=info
      --scheduler celery.beat:PersistentScheduler
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - reports_data:/app/reports
    networks:
      - social_intel_net

  # Worker AI — untuk sentiment, NER, embedding inference (butuh torch/transformers)
  worker-ai:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.worker-ai
    container_name: social_intel_worker_ai
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-social_intelligence}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-social_intelligence_db}
      REDIS_URL: redis://redis:6379
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      OLLAMA_BASE_URL: http://ollama:11434
      MODELS_CACHE_DIR: /app/models_cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    volumes:
      - ./app:/app/app
      - models_cache:/app/models_cache
    networks:
      - social_intel_net
    deploy:
      resources:
        limits:
          memory: 8G  # torch + models butuh RAM besar

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:
  ollama_data:
  models_cache:
  reports_data:

networks:
  social_intel_net:
    driver: bridge
